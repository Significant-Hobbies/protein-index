name: Publish reviewed label candidates

on:
  workflow_dispatch:
    inputs:
      extraction_run_id:
        description: Successful Robotoff extraction workflow run ID to publish
        required: true
        type: string
      expected_input_hash:
        description: Reviewed extraction manifest input SHA-256
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: protein-index-production-publication
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      EXTRACTION_RUN_ID: ${{ inputs.extraction_run_id }}
      EXPECTED_INPUT_HASH: ${{ inputs.expected_input_hash }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download the selected reviewed extraction
        uses: actions/github-script@v9
        env:
          RUN_ID: ${{ env.EXTRACTION_RUN_ID }}
        with:
          script: |
            const fs = require('fs');
            const runId = Number(process.env.RUN_ID);
            if (!Number.isSafeInteger(runId) || runId <= 0) throw new Error('extraction_run_id must be a positive workflow run ID');
            const response = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
              per_page: 100,
            });
            const expectedName = `robotoff-label-candidates-${runId}`;
            const artifact = response.data.artifacts.find((candidate) => candidate.name === expectedName && !candidate.expired);
            if (!artifact) throw new Error(`Reviewed artifact ${expectedName} was not found or has expired`);
            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
              archive_format: 'zip',
            });
            fs.writeFileSync('.data-robotoff.zip', Buffer.from(download.data));

      - name: Expand and pin reviewed extraction
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .data/publish-robotoff
          unzip -q .data-robotoff.zip -d .data/publish-robotoff
          cd .data/publish-robotoff
          sha256sum --check checksums.sha256
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          const manifest = JSON.parse(await readFile('manifest.json', 'utf8'));
          const report = JSON.parse(await readFile('report.json', 'utf8'));
          const failures = [];
          if (manifest.source !== 'open_food_facts_robotoff') failures.push('unexpected extraction source');
          if (manifest.mode !== 'production') failures.push('extraction mode is not production');
          if (manifest.sourceComplete !== true || report.sourceComplete !== true) failures.push('extraction is incomplete');
          if (manifest.terminalEvidence !== 'end_of_file') failures.push('extraction did not exhaust its eligible barcode set');
          if (manifest.inputHash !== process.env.EXPECTED_INPUT_HASH) failures.push('extraction input hash differs from the reviewed hash');
          if (report.accountedBarcodes !== report.requestedBarcodes) failures.push('barcode accounting does not reconcile');
          if (report.outcomes?.failed !== 0) failures.push('extraction contains failed barcodes');
          if (failures.length) throw new Error(failures.join('; '));
          NODE

      - name: Publish review-gated candidate source records
        run: pnpm data:publish -- --input .data/publish-robotoff --remote --confirm-remote

      - name: Record candidate publication state
        run: >-
          pnpm exec wrangler d1 execute protein-index --remote --yes --json --command
          "SELECT COUNT(*) AS source_records FROM source_records WHERE source_id = 'open_food_facts_robotoff';
          SELECT COUNT(*) AS open_candidates FROM review_items r JOIN source_records s ON s.id = r.source_record_id
          WHERE s.source_id = 'open_food_facts_robotoff' AND r.status = 'open'
          AND json_extract(r.evidence_json, '$.code') = 'robotoff_nutrition_candidate';"
          > .data/publish-robotoff/publication-state.json

      - name: Checksum publication evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          find .data/publish-robotoff -maxdepth 1 -type f ! -name publication-checksums.sha256 -print0 \
            | sort -z \
            | xargs -0 sha256sum > .data/publish-robotoff/publication-checksums.sha256

      - name: Upload candidate publication evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: label-candidate-publication-${{ github.run_id }}
          retention-days: 90
          if-no-files-found: warn
          path: |
            .data/publish-robotoff/manifest.json
            .data/publish-robotoff/report.json
            .data/publish-robotoff/checksums.sha256
            .data/publish-robotoff/publication-state.json
            .data/publish-robotoff/publication-checksums.sha256
