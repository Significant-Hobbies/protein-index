name: Publish reviewed label candidates

on:
  workflow_dispatch:
    inputs:
      candidate_family:
        description: Review-gated candidate family to publish
        required: true
        default: nutrition
        type: choice
        options:
          - nutrition
          - ingredients
      extraction_run_id:
        description: Successful Robotoff extraction workflow run ID to publish
        required: true
        type: string
      expected_input_hash:
        description: Reviewed extraction manifest input SHA-256
        required: true
        type: string
      expected_head_sha:
        description: Exact successful extraction commit SHA reviewed for publication
        required: true
        type: string
      expected_artifact_digest:
        description: Exact GitHub artifact digest in sha256:<hex> form
        required: true
        type: string
      confirm_production_publication:
        description: Type PUBLISH_REVIEWED_LABEL_CANDIDATES_TO_PRODUCTION exactly
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: protein-index-production-publication
  cancel-in-progress: false

jobs:
  authorize:
    # Replaced by publish-guarded-reviewed-labels.yml: source and successor must share one D1 import.
    if: ${{ false }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    outputs:
      approved: ${{ steps.gate.outputs.approved }}
    steps:
      - name: Require explicit candidate publication approval
        id: gate
        shell: bash
        env:
          CONFIRM_PRODUCTION_PUBLICATION: ${{ inputs.confirm_production_publication }}
          EXTRACTION_RUN_ID: ${{ inputs.extraction_run_id }}
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::Candidate publication must be dispatched from main."
            exit 1
          fi
          if [[ "$CONFIRM_PRODUCTION_PUBLICATION" != "PUBLISH_REVIEWED_LABEL_CANDIDATES_TO_PRODUCTION" ]]; then
            echo "::error::Exact candidate publication confirmation was not supplied."
            exit 1
          fi
          if [[ ! "$EXTRACTION_RUN_ID" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::extraction_run_id must be a positive workflow run ID."
            exit 1
          fi
          echo "approved=true" >> "$GITHUB_OUTPUT"

  publish:
    needs: authorize
    if: needs.authorize.outputs.approved == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: production
    env:
      CANDIDATE_FAMILY: ${{ inputs.candidate_family }}
      EXTRACTION_RUN_ID: ${{ inputs.extraction_run_id }}
      EXPECTED_INPUT_HASH: ${{ inputs.expected_input_hash }}
      EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha }}
      EXPECTED_ARTIFACT_DIGEST: ${{ inputs.expected_artifact_digest }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Download the selected reviewed extraction
        id: reviewed
        uses: actions/github-script@v9
        env:
          RUN_ID: ${{ env.EXTRACTION_RUN_ID }}
        with:
          script: |
            const fs = require('fs');
            const runId = Number(process.env.RUN_ID);
            if (!Number.isSafeInteger(runId) || runId <= 0) throw new Error('extraction_run_id must be a positive workflow run ID');
            if (new Set([29551181430, 29552807113]).has(runId)) throw new Error('The selected extraction workflow run is explicitly superseded and denied');
            const family = process.env.CANDIDATE_FAMILY;
            if (!['nutrition', 'ingredients'].includes(family)) throw new Error('candidate_family is not supported');
            if (!/^[a-f0-9]{40}$/.test(process.env.EXPECTED_HEAD_SHA ?? '')) throw new Error('expected_head_sha must be an exact lowercase commit SHA');
            if (!/^sha256:[a-f0-9]{64}$/.test(process.env.EXPECTED_ARTIFACT_DIGEST ?? '')) throw new Error('expected_artifact_digest must be an immutable GitHub artifact digest');
            const selectedRun = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });
            const run = selectedRun.data;
            const expectedWorkflow = family === 'ingredients'
              ? 'Extract ingredient label evidence'
              : 'Extract label evidence with Robotoff';
            if (run.name !== expectedWorkflow || run.conclusion !== 'success') throw new Error('Selected run is not a successful expected extraction workflow');
            if (run.head_branch !== context.payload.repository.default_branch) throw new Error('Selected extraction is not from the default branch');
            if (run.head_repository?.full_name !== `${context.repo.owner}/${context.repo.repo}`) throw new Error('Selected extraction is not from this repository');
            if (run.head_sha !== process.env.EXPECTED_HEAD_SHA) throw new Error('Selected extraction head SHA differs from the reviewed SHA');
            const response = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
              per_page: 100,
            });
            const prefix = family === 'ingredients' ? 'robotoff-ingredient-candidates' : 'robotoff-label-candidates';
            const expectedName = `${prefix}-${runId}`;
            const matches = response.data.artifacts.filter((candidate) => candidate.name === expectedName && !candidate.expired);
            if (matches.length !== 1) throw new Error(`Expected exactly one unexpired reviewed artifact named ${expectedName}`);
            const artifact = matches[0];
            if (artifact && new Set([8395774354, 8396363821]).has(artifact.id)) {
              throw new Error('The selected extraction artifact is explicitly superseded and denied');
            }
            if (!artifact || artifact.digest !== process.env.EXPECTED_ARTIFACT_DIGEST || artifact.size_in_bytes <= 0) {
              throw new Error('Reviewed artifact digest or size differs from the pinned evidence');
            }
            core.setOutput('artifact_name', expectedName);
            core.setOutput('artifact_digest', artifact.digest);
            core.setOutput('artifact_bytes', String(artifact.size_in_bytes));
            core.setOutput('workflow_name', expectedWorkflow);
            core.setOutput('upstream_head_sha', run.head_sha);
            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
              archive_format: 'zip',
            });
            fs.writeFileSync('.data-robotoff.zip', Buffer.from(download.data));

      - name: Require current publisher and extraction ancestry
        shell: bash
        env:
          PUBLISHER_HEAD_SHA: ${{ github.sha }}
          UPSTREAM_HEAD_SHA: ${{ steps.reviewed.outputs.upstream_head_sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$PUBLISHER_HEAD_SHA"
          git merge-base --is-ancestor "$UPSTREAM_HEAD_SHA" "$PUBLISHER_HEAD_SHA"
          test -f .github/workflows/publish-robotoff-candidates.yml

      - name: Expand and pin reviewed extraction
        shell: bash
        env:
          ARTIFACT_DIGEST: ${{ steps.reviewed.outputs.artifact_digest }}
          ARTIFACT_BYTES: ${{ steps.reviewed.outputs.artifact_bytes }}
        run: |
          set -euo pipefail
          expected_digest="${ARTIFACT_DIGEST#sha256:}"
          actual_digest="$(sha256sum .data-robotoff.zip | awk '{print $1}')"
          actual_bytes="$(stat --format=%s .data-robotoff.zip)"
          if [[ "$actual_digest" != "$expected_digest" ]]; then
            echo "::error::Downloaded extraction artifact digest differs from the reviewed GitHub digest."
            exit 1
          fi
          if [[ "$actual_bytes" != "$ARTIFACT_BYTES" ]]; then
            echo "::error::Downloaded extraction artifact size differs from the reviewed GitHub size."
            exit 1
          fi
          mkdir -p .data/publish-robotoff
          unzip -q .data-robotoff.zip -d .data/publish-robotoff
          cd .data/publish-robotoff
          sha256sum --check checksums.sha256
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          const manifest = JSON.parse(await readFile('manifest.json', 'utf8'));
          const report = JSON.parse(await readFile('report.json', 'utf8'));
          const failures = [];
          const expectedSource = process.env.CANDIDATE_FAMILY === 'ingredients'
            ? 'open_food_facts_robotoff_ingredients'
            : 'open_food_facts_robotoff';
          const expectedAdapter = process.env.CANDIDATE_FAMILY === 'ingredients'
            ? 'robotoff-ingredients-api-v3'
            : 'robotoff-api-v8';
          if (manifest.source !== expectedSource) failures.push('unexpected extraction source');
          if (manifest.adapterVersion !== expectedAdapter) failures.push('extraction adapter is not the current reviewed version');
          if (manifest.mode !== 'production') failures.push('extraction mode is not production');
          if (manifest.sourceComplete !== true || report.sourceComplete !== true) failures.push('extraction is incomplete');
          if (manifest.terminalEvidence !== 'end_of_file') failures.push('extraction did not exhaust its eligible barcode set');
          if (manifest.inputHash !== process.env.EXPECTED_INPUT_HASH) failures.push('extraction input hash differs from the reviewed hash');
          if (report.accountedBarcodes !== report.requestedBarcodes) failures.push('barcode accounting does not reconcile');
          const failed = report.outcomes?.failed;
          const rate = failed / report.requestedBarcodes;
          if (manifest.outcomeAccountingComplete !== true || report.outcomeAccountingComplete !== true) failures.push('outcome accounting is incomplete');
          if (manifest.verificationComplete !== (failed === 0) || report.verificationComplete !== (failed === 0)) failures.push('verification completeness is inconsistent');
          if (manifest.residualExceptionCount !== failed || report.residualExceptionCount !== failed) failures.push('residual exception count is inconsistent');
          if (manifest.residualExceptionRate !== rate || report.residualExceptionRate !== rate) failures.push('residual exception rate is inconsistent');
          if (manifest.residualExceptionLimits?.maxCount !== 10 || report.residualExceptionLimits?.maxCount !== 10) failures.push('residual count limit has drifted');
          if (manifest.residualExceptionLimits?.maxRate !== 0.0025 || report.residualExceptionLimits?.maxRate !== 0.0025) failures.push('residual rate limit has drifted');
          if (!Number.isSafeInteger(failed) || failed < 0 || failed > 10 || rate > 0.0025) failures.push('residual exceptions exceed the fixed policy');
          if (typeof report.requestSchema !== 'string' || !/^[a-f0-9]{64}$/.test(report.requestSchema)) failures.push('extraction request schema is missing');
          if (typeof report.extractionRunId !== 'string' || !/^xrun_[a-f0-9]{24}$/.test(report.extractionRunId)) failures.push('extraction run identity is missing');
          if (typeof report.parentSourceRunId !== 'string' || !/^run_[a-f0-9]{24}$/.test(report.parentSourceRunId)) failures.push('parent source run identity is missing');
          if (![report.labelAssets, report.extractionAttempts, report.extractionAttemptLabels].every(Number.isSafeInteger)) failures.push('exact label accounting is missing');
          await readFile('decision-drift.json', 'utf8').then(JSON.parse).catch(() => failures.push('bound decision-drift evidence is missing or invalid'));
          if (failures.length) throw new Error(failures.join('; '));
          NODE

      - name: Re-audit reviewed decisions against the pinned extraction
        shell: bash
        run: |
          set -euo pipefail
          pnpm data:audit-decisions -- \
            --artifact .data/publish-robotoff \
            --bundles review-decisions \
            --bundle-set review-decisions/active-bundles.json \
            --output .data/publish-robotoff/publication-decision-drift.json \
            --fail-on candidate_key_active_state_ambiguous

      - name: Require protected publication credentials
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [[ -z "$CLOUDFLARE_API_TOKEN" || -z "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "::error::The protected production environment is missing Cloudflare publication credentials."
            exit 1
          fi

      - name: Publish review-gated candidate source records
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ARTIFACT_NAME: ${{ steps.reviewed.outputs.artifact_name }}
          ARTIFACT_DIGEST: ${{ steps.reviewed.outputs.artifact_digest }}
          ARTIFACT_BYTES: ${{ steps.reviewed.outputs.artifact_bytes }}
          WORKFLOW_NAME: ${{ steps.reviewed.outputs.workflow_name }}
        run: |
          set -euo pipefail
          pnpm data:publish -- \
            --input .data/publish-robotoff \
            --remote \
            --confirm-remote \
            --automatic \
            --skip-migrations \
            --workflow-name "$WORKFLOW_NAME" \
            --upstream-run-id "$EXTRACTION_RUN_ID" \
            --upstream-head-sha "$EXPECTED_HEAD_SHA" \
            --upstream-head-branch main \
            --upstream-repository Significant-Hobbies/protein-index \
            --artifact-name "$ARTIFACT_NAME" \
            --artifact-digest "$ARTIFACT_DIGEST" \
            --artifact-bytes "$ARTIFACT_BYTES"

      - name: Record candidate publication state
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [[ "$CANDIDATE_FAMILY" == "ingredients" ]]; then
            source_id="open_food_facts_robotoff_ingredients"
            review_code="robotoff_ingredient_candidate"
          elif [[ "$CANDIDATE_FAMILY" == "nutrition" ]]; then
            source_id="open_food_facts_robotoff"
            review_code="robotoff_nutrition_candidate"
          else
            echo "Unsupported candidate family: $CANDIDATE_FAMILY" >&2
            exit 1
          fi
          pnpm exec wrangler d1 execute protein-index --remote --yes --json --command \
            "SELECT COUNT(*) AS source_records FROM source_records WHERE source_id = '$source_id';
            SELECT COUNT(*) AS open_candidates FROM review_items r JOIN source_records s ON s.id = r.source_record_id
            WHERE s.source_id = '$source_id' AND r.status = 'open'
            AND json_extract(r.evidence_json, '$.code') = '$review_code';" \
            > .data/publish-robotoff/publication-state.json

      - name: Checksum publication evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          find .data/publish-robotoff -maxdepth 1 -type f ! -name publication-checksums.sha256 -print0 \
            | sort -z \
            | xargs -0 sha256sum > .data/publish-robotoff/publication-checksums.sha256

      - name: Upload candidate publication evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: review-candidate-publication-${{ github.run_id }}
          retention-days: 90
          if-no-files-found: warn
          path: |
            .data/publish-robotoff/manifest.json
            .data/publish-robotoff/report.json
            .data/publish-robotoff/checksums.sha256
            .data/publish-robotoff/decision-drift.json
            .data/publish-robotoff/publication-decision-drift.json
            .data/publish-robotoff/publication-state.json
            .data/publish-robotoff/publication-checksums.sha256
