name: Publish reviewed catalog

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: Successful Source sync workflow run ID to publish
        required: true
        type: string
      expected_input_hash:
        description: Reviewed manifest input SHA-256
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: protein-index-production-publication
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download the selected reviewed snapshot
        uses: actions/github-script@v9
        env:
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        with:
          script: |
            const fs = require('fs');
            const runId = Number(process.env.SOURCE_RUN_ID);
            if (!Number.isSafeInteger(runId) || runId <= 0) throw new Error('source_run_id must be a positive workflow run ID');
            const response = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
              per_page: 100,
            });
            const expectedName = `open-food-facts-snapshot-${runId}`;
            const artifact = response.data.artifacts.find((candidate) => candidate.name === expectedName && !candidate.expired);
            if (!artifact) throw new Error(`Reviewed artifact ${expectedName} was not found or has expired`);
            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
              archive_format: 'zip',
            });
            fs.writeFileSync('.data-publish.zip', Buffer.from(download.data));

      - name: Expand and pin the reviewed snapshot
        shell: bash
        env:
          EXPECTED_INPUT_HASH: ${{ inputs.expected_input_hash }}
        run: |
          set -euo pipefail
          mkdir -p .data/publish
          unzip -q .data-publish.zip -d .data/publish
          actual_hash="$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('.data/publish/manifest.json','utf8')).inputHash)")"
          test "$actual_hash" = "$EXPECTED_INPUT_HASH"

      - name: Publish to Cloudflare D1
        run: pnpm data:publish -- --input .data/publish --remote --confirm-remote

      - name: Record publication evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: catalog-publication-${{ github.run_id }}
          retention-days: 90
          if-no-files-found: error
          path: |
            .data/publish/manifest.json
            .data/publish/report.json
            .data/publish/checksums.sha256
