name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "AGENTS.md"
      - "STATUS.md"
      - "README.md"
      - "scripts/validate-docs.mjs"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "AGENTS.md"
      - "STATUS.md"
      - "README.md"
      - "scripts/validate-docs.mjs"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Validate docs
        run: node scripts/validate-docs.mjs
