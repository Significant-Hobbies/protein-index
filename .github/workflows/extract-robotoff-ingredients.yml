name: Extract ingredient label evidence

on:
  workflow_run:
    workflows: [Source sync]
    types: [completed]
  workflow_dispatch:
    inputs:
      source_run_id:
        description: Successful Source sync workflow run ID containing the production Open Food Facts snapshot
        required: true
        type: string
      expected_input_hash:
        description: Optional source-export SHA-256 to pin this run
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: open-food-facts-robotoff-ingredient-extraction
  cancel-in-progress: false

jobs:
  extract:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      SOURCE_RUN_ID: ${{ github.event.workflow_run.id || inputs.source_run_id }}
      EXPECTED_INPUT_HASH: ${{ inputs.expected_input_hash || '' }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Download source-complete snapshot
        uses: actions/github-script@v9
        env:
          RUN_ID: ${{ env.SOURCE_RUN_ID }}
        with:
          script: |
            const fs = require('fs');
            const { createHash } = require('crypto');
            const runId = Number(process.env.RUN_ID);
            if (!Number.isSafeInteger(runId) || runId <= 0) throw new Error('source_run_id must be a positive workflow run ID');
            const selectedRun = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });
            const run = selectedRun.data;
            if (run.name !== 'Source sync' || run.conclusion !== 'success') throw new Error('Selected parent is not a successful Source sync run');
            if (run.head_branch !== context.payload.repository.default_branch) throw new Error('Selected Source sync is not from the default branch');
            if (run.head_repository?.full_name !== `${context.repo.owner}/${context.repo.repo}`) throw new Error('Selected Source sync is not from this repository');
            const response = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
              per_page: 100,
            });
            const expectedName = `open-food-facts-snapshot-${runId}`;
            const matches = response.data.artifacts.filter((candidate) => candidate.name === expectedName && !candidate.expired);
            if (matches.length !== 1) throw new Error(`Expected exactly one unexpired source artifact named ${expectedName}`);
            const artifact = matches[0];
            if (!artifact || !/^sha256:[a-f0-9]{64}$/.test(artifact.digest ?? '') || artifact.size_in_bytes <= 0) {
              throw new Error('Source artifact does not expose a valid immutable digest and size');
            }
            const download = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
              archive_format: 'zip',
            });
            const archive = Buffer.from(download.data);
            const digest = `sha256:${createHash('sha256').update(archive).digest('hex')}`;
            if (digest !== artifact.digest || archive.byteLength !== artifact.size_in_bytes) {
              throw new Error('Downloaded source artifact digest or size differs from immutable GitHub metadata');
            }
            fs.writeFileSync('.data-source.zip', archive);

      - name: Expand and validate source snapshot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .data/source-snapshot
          unzip -q .data-source.zip -d .data/source-snapshot
          cd .data/source-snapshot
          sha256sum --check checksums.sha256
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          const manifest = JSON.parse(await readFile('manifest.json', 'utf8'));
          const failures = [];
          if (manifest.source !== 'open_food_facts') failures.push('unexpected source');
          if (manifest.mode !== 'production') failures.push('source mode is not production');
          if (manifest.sourceComplete !== true) failures.push('source is not complete');
          if (manifest.terminalEvidence !== 'end_of_file') failures.push('source did not reach end-of-file');
          if (process.env.EXPECTED_INPUT_HASH && manifest.inputHash !== process.env.EXPECTED_INPUT_HASH) failures.push('input hash differs from the requested hash');
          if (failures.length) throw new Error(failures.join('; '));
          NODE
          staged_hash="$(sha256sum staged-products.jsonl | cut -d ' ' -f 1)"
          echo "SOURCE_STAGED_HASH=$staged_hash" >> "$GITHUB_ENV"

      - name: Restore exact-snapshot ingredient responses
        uses: ./.github/actions/restore-exact-responses
        with:
          artifact-prefix: robotoff-ingredient-candidates-
          output-directory: .data/robotoff-ingredients
          expected-source: open_food_facts_robotoff_ingredients
          expected-request-schema: 36dbe4371ac9da9ea089a5ef8e88264e19ab6bb5764b15235561a136199b491d
          expected-workflow-name: Extract ingredient label evidence
          diagnostic-artifact-prefix: robotoff-ingredient-diagnostics-
          expected-adapter-version: robotoff-ingredients-api-v3
          expected-diagnostic-failure-step: Extract every eligible ingredient label image
          restore-label-proofs: "true"

      - name: Extract every eligible ingredient label image
        timeout-minutes: 345
        shell: bash
        run: |
          set -uo pipefail
          status=1
          for pass in 1 2 3 4; do
            echo "Starting ingredient extraction pass $pass of 4"
            set +e
            pnpm data:extract -- \
              --source robotoff-ingredients \
              --input .data/source-snapshot/staged-products.jsonl \
              --manifest .data/source-snapshot/manifest.json \
              --output .data/robotoff-ingredients \
              --mode production \
              --confidence-threshold 0.85 \
              --minimum-interval-ms 1100 \
              --maximum-attempts 4
            status=$?
            set -e
            if [[ "$status" -eq 0 ]]; then
              break
            fi
            if [[ "$pass" -lt 4 ]]; then
              echo "Extraction remains incomplete; cooling down before resuming failed GTINs"
              sleep 60
            fi
          done
          exit "$status"

      - name: Verify terminal cohort accounting and checksums
        shell: bash
        run: |
          set -euo pipefail
          cd .data/robotoff-ingredients
          sha256sum --check checksums.sha256
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          const manifest = JSON.parse(await readFile('manifest.json', 'utf8'));
          const report = JSON.parse(await readFile('report.json', 'utf8'));
          const failures = [];
          if (manifest.source !== 'open_food_facts_robotoff_ingredients') failures.push('unexpected extraction source');
          if (manifest.mode !== 'production') failures.push('extraction mode is not production');
          if (manifest.sourceComplete !== true || report.sourceComplete !== true) failures.push('extraction is incomplete');
          if (manifest.terminalEvidence !== 'end_of_file') failures.push('eligible ingredient-image cohort was not exhausted');
          if (report.accountedBarcodes !== report.requestedBarcodes) failures.push('GTIN accounting does not reconcile');
          const failed = report.outcomes?.failed;
          const rate = failed / report.requestedBarcodes;
          if (manifest.outcomeAccountingComplete !== true || report.outcomeAccountingComplete !== true) failures.push('outcome accounting is incomplete');
          if (manifest.verificationComplete !== (failed === 0) || report.verificationComplete !== (failed === 0)) failures.push('verification completeness is inconsistent');
          if (manifest.residualExceptionCount !== failed || report.residualExceptionCount !== failed) failures.push('residual exception count is inconsistent');
          if (manifest.residualExceptionRate !== rate || report.residualExceptionRate !== rate) failures.push('residual exception rate is inconsistent');
          if (manifest.residualExceptionLimits?.maxCount !== 10 || report.residualExceptionLimits?.maxCount !== 10) failures.push('residual count limit has drifted');
          if (manifest.residualExceptionLimits?.maxRate !== 0.0025 || report.residualExceptionLimits?.maxRate !== 0.0025) failures.push('residual rate limit has drifted');
          if (!Number.isSafeInteger(failed) || failed < 0 || failed > 10 || rate > 0.0025) failures.push('residual exceptions exceed the fixed policy');
          if (!report.cohortHash) failures.push('cohort hash is missing');
          if (failures.length) throw new Error(failures.join('; '));
          NODE

      - name: Audit reviewed decisions against exact ingredient evidence
        shell: bash
        run: |
          set -euo pipefail
          pnpm data:audit-decisions -- \
            --artifact .data/robotoff-ingredients \
            --bundles review-decisions \
            --output .data/decision-drift/ingredients-v3.json \
            --fail-on candidate_key_active_state_ambiguous

      - name: Bind decision-drift evidence into the portable artifact
        shell: bash
        run: |
          set -euo pipefail
          cp .data/decision-drift/ingredients-v3.json .data/robotoff-ingredients/decision-drift.json
          (cd .data/robotoff-ingredients && sha256sum decision-drift.json >> checksums.sha256)

      - name: Upload review-gated ingredient candidates
        uses: actions/upload-artifact@v7
        with:
          name: robotoff-ingredient-candidates-${{ github.run_id }}
          compression-level: 9
          retention-days: 90
          if-no-files-found: error
          path: |
            .data/robotoff-ingredients/manifest.json
            .data/robotoff-ingredients/report.json
            .data/robotoff-ingredients/cohort.jsonl
            .data/robotoff-ingredients/label-assets.jsonl
            .data/robotoff-ingredients/extraction-attempts.jsonl
            .data/robotoff-ingredients/extraction-attempt-labels.jsonl
            .data/robotoff-ingredients/candidates.jsonl
            .data/robotoff-ingredients/source-index.jsonl
            .data/robotoff-ingredients/exclusions.jsonl
            .data/robotoff-ingredients/outcomes.jsonl
            .data/robotoff-ingredients/staged-products.jsonl
            .data/robotoff-ingredients/decision-drift.json
            .data/robotoff-ingredients/responses/*.json
            .data/robotoff-ingredients/checksums.sha256

      - name: Upload ingredient decision-drift audit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: robotoff-ingredient-decision-drift-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: .data/decision-drift/ingredients-v3.json

      - name: Upload extraction diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: robotoff-ingredient-diagnostics-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            .data/robotoff-ingredients/manifest.json
            .data/robotoff-ingredients/report.json
            .data/robotoff-ingredients/outcomes.jsonl
            .data/robotoff-ingredients/label-assets.jsonl
            .data/robotoff-ingredients/extraction-attempts.jsonl
            .data/robotoff-ingredients/extraction-attempt-labels.jsonl
            .data/robotoff-ingredients/responses/*.json
